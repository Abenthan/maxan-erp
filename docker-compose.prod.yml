services:
  postgres:
    image: postgres:16
    container_name: maxan_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME}
    ports:
      - "127.0.0.1:5433:5432"   # host:5433 → container:5432 (interno siempre 5432)
    volumes:
      - maxan_db_data:/var/lib/postgresql/data
      - ./db/init:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER} -d ${DB_NAME}"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: maxan-backend
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    env_file: .env
    environment:
      NODE_ENV: production
    ports:
      - "127.0.0.1:3001:3000"

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: maxan-frontend
    restart: unless-stopped
    ports:
      - "127.0.0.1:8084:80"

volumes:
  maxan_db_data:
